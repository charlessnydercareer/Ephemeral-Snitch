services:
  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: snitch_test
      POSTGRES_USER: snitch_bootstrap
      POSTGRES_PASSWORD: ${SNITCH_TEST_BOOTSTRAP_PASSWORD:?required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snitch_bootstrap -d snitch_test"]
      interval: 1s
      timeout: 3s
      retries: 30
    ports:
      - "127.0.0.1::5432"
    tmpfs:
      - /var/lib/postgresql
